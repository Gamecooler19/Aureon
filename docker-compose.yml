# =============================================================================
# Aureon - Music  ·  ACE-Step 1.5
# docker compose up -d          →  http://localhost:3297
# docker compose up -d --build  →  rebuild image first
#
# All configurable values are loaded from .env (see .env.example).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — unified FastAPI + Studio UI server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: Aureon-music:latest
    container_name: Aureon_music

    restart: unless-stopped

    # Load variables from .env at project root
    env_file:
      - .env

    # GPU access (requires nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    ports:
      - "${HOST_PORT}:${ACESTEP_API_PORT}"

    # Persistent volumes -------------------------------------------------------
    volumes:
      # Model checkpoints — survives container rebuild
      - checkpoints:/app/checkpoints
      # HuggingFace / ModelScope cache
      - hf_cache:/app/.cache/huggingface
      # Compiled Triton / Inductor kernels (warm up once, reuse forever)
      - triton_cache:/app/.cache/triton
      - inductor_cache:/app/.cache/torchinductor
      # Temp inference files
      - tmp_cache:/app/.cache/tmp
      # Persistent audio output (bind-mount to host for easy access)
      - ./Audio:/app/Audio
      # Generated audio outputs (optional — remove if you stream everything)
      - outputs:/app/outputs

    # Environment — values come from .env; only fixed paths are set here -------
    environment:
      # ── Fixed container paths (mapped to volumes above) ────────────────────
      ACESTEP_API_HOST:         0.0.0.0
      HF_HOME:                  /app/.cache/huggingface
      TORCH_HOME:               /app/.cache/torch
      TRITON_CACHE_DIR:         /app/.cache/triton
      TORCHINDUCTOR_CACHE_DIR:  /app/.cache/torchinductor
      ACESTEP_TMPDIR:           /app/.cache/tmp
      AUDIO_OUTPUT_DIR:         /app/Audio

    # Healthcheck --------------------------------------------------------------
    healthcheck:
      test: [ "CMD-SHELL",
              "curl -sf http://localhost:${ACESTEP_API_PORT}/health | python3 -c \"import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('data',{}).get('status')=='ok' else 1)\"" ]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 120s

    # Logging ------------------------------------------------------------------
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE}"
        max-file: "${LOG_MAX_FILE}"

# =============================================================================
# Named volumes — Docker manages the lifecycle
# =============================================================================
volumes:
  checkpoints:
    name: Aureon_checkpoints
  hf_cache:
    name: Aureon_hf_cache
  triton_cache:
    name: Aureon_triton_cache
  inductor_cache:
    name: Aureon_inductor_cache
  tmp_cache:
    name: Aureon_tmp_cache
  outputs:
    name: Aureon_outputs
